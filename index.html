<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TfL Sidebar</title>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;
    }

    #board {
      width: 100%;
    }

    .section-title {
      font-size: clamp(14px, 1.8vw, 28px);
      font-weight: bold;
      padding: 1.2vh 1vw;
      background: #333;
      color: white;
      margin-top: 1vh;
    }

    .row {
      display: flex;
      width: 100%;
      margin: 0.5vh 0;
      font-size: clamp(16px, 2.2vw, 36px);
    }

    .line-name {
      flex: 1;
      padding: 1.2vh 1vw;
      font-weight: bold;
      color: white;
      display: flex;
      align-items: center;
    }

    .status {
      padding: 1.2vh 1vw;
      font-weight: bold;
      color: white;
      white-space: nowrap;
      display: flex;
      align-items: center;
    }

    .good { background: #008000; }
    .bad { background: #cc0000; }

    .station-row {
      display: flex;
      width: 100%;
      margin: 0.3vh 0;
      font-size: clamp(12px, 1.6vw, 24px);
      padding: 0.8vh 1vw;
      border-bottom: 1px solid #ddd;
    }

    .station-name {
      flex: 1;
      font-weight: bold;
    }

    .station-status {
      white-space: nowrap;
      margin-left: 1vw;
    }

    .station-section {
      margin-top: 1vh;
      border: 1px solid #ccc;
      background: #f9f9f9;
    }
  </style>
</head>

<body>
  <div id="board"></div>

  <script>
    const lineColors = {
      "Bakerloo": "#B36305",
      "Central": "#E32017",
      "Circle": "#FFD300",
      "District": "#00782A",
      "Hammersmith & City": "#F3A9BB",
      "Jubilee": "#A0A5A9",
      "Metropolitan": "#9B0056",
      "Northern": "#000000",
      "Piccadilly": "#003688",
      "Victoria": "#0098D4",
      "Waterloo & City": "#95CDBA",
      "Elizabeth line": "#6950A1"
    };

    const PADDINGTON_ID = "940GZZLUPAD";
    const MARYLEBONE_ID = "910GMARYLBN";

    async function getArrivals(stopId) {
      const res = await fetch(`https://api.tfl.gov.uk/StopPoint/${stopId}/Arrivals`);
      const data = await res.json();

      return data
        .sort((a, b) => a.timeToStation - b.timeToStation)
        .slice(0, 5);
    }

    function addStationSection(title, color, arrivals) {
      const board = document.getElementById('board');

      const section = document.createElement('div');
      section.className = 'station-section';

      const header = document.createElement('div');
      header.className = 'section-title';
      header.style.background = color;
      header.textContent = title;

      section.appendChild(header);

      if (!arrivals || arrivals.length === 0) {
        const row = document.createElement('div');
        row.className = 'station-row';
        row.textContent = 'No live departures';
        section.appendChild(row);
        board.appendChild(section);
        return;
      }

      arrivals.forEach(t => {
        const row = document.createElement('div');
        row.className = 'station-row';

        const name = document.createElement('div');
        name.className = 'station-name';
        name.textContent = t.destinationName;

        const time = document.createElement('div');
        time.className = 'station-status';
        time.textContent = `${Math.round(t.timeToStation / 60)} min`;

        row.appendChild(name);
        row.appendChild(time);
        section.appendChild(row);
      });

      board.appendChild(section);
    }

    async function loadElizabethStatus() {
      const res = await fetch("https://api.tfl.gov.uk/Line/elizabeth/status");
      const data = await res.json();

      const line = data[0];
      const status = line.lineStatuses[0].statusSeverityDescription;
      const isGood = status === "Good Service";

      const board = document.getElementById('board');

      const row = document.createElement('div');
      row.className = 'row';

      const name = document.createElement('div');
      name.className = 'line-name';
      name.textContent = "Elizabeth line";
      name.style.background = lineColors["Elizabeth line"];

      const statusEl = document.createElement('div');
      statusEl.className = 'status ' + (isGood ? 'good' : 'bad');
      statusEl.textContent = status;

      row.appendChild(name);
      row.appendChild(statusEl);
      board.appendChild(row);
    }

    async function loadTubeStatus() {
      const res = await fetch('https://api.tfl.gov.uk/Line/Mode/tube/Status');
      const data = await res.json();

      const board = document.getElementById('board');

      const tubeTitle = document.createElement('div');
      tubeTitle.className = 'section-title';
      tubeTitle.textContent = 'London Underground';
      board.appendChild(tubeTitle);

      data.forEach(line => {
        const status = line.lineStatuses[0].statusSeverityDescription;
        const isGood = status === 'Good Service';

        const row = document.createElement('div');
        row.className = 'row';

        const name = document.createElement('div');
        name.className = 'line-name';
        name.textContent = line.name;
        name.style.background = lineColors[line.name] || '#000';

        const statusEl = document.createElement('div');
        statusEl.className = 'status ' + (isGood ? 'good' : 'bad');
        statusEl.textContent = status;

        row.appendChild(name);
        row.appendChild(statusEl);
        board.appendChild(row);
      });
    }

    async function loadAllStatus() {
      const board = document.getElementById('board');
      board.innerHTML = '';

      await loadElizabethStatus();
      await loadTubeStatus();

      const pad = await getArrivals(PADDINGTON_ID);
      const mary = await getArrivals(MARYLEBONE_ID);

      addStationSection("Paddington", "#000000", pad);
      addStationSection("Marylebone", "#1c3f94", mary);
    }

    loadAllStatus();
    setInterval(loadAllStatus, 60000);
  </script>
</body>
</html>
