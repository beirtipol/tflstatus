<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TfL Sidebar</title>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;
    }

    #board {
      width: 100%;
    }

    .section-title {
      font-size: clamp(14px, 1.8vw, 28px);
      font-weight: bold;
      padding: 1.2vh 1vw;
      background: #333;
      color: white;
      margin-top: 1vh;
    }

    .row {
      display: flex;
      width: 100%;
      margin: 0.5vh 0;
      font-size: clamp(16px, 2.2vw, 36px);
    }

    .line-name {
      flex: 1; /* takes full remaining width */
      padding: 1.2vh 1vw;
      font-weight: bold;
      color: white;
      display: flex;
      align-items: center;
    }

    .status {
      padding: 1.2vh 1vw;
      font-weight: bold;
      color: white;
      white-space: nowrap;
      display: flex;
      align-items: center;
    }

    .good {
      background: #008000;
    }

    .bad {
      background: #cc0000;
    }

    .station-row {
      display: flex;
      width: 100%;
      margin: 0.3vh 0;
      font-size: clamp(12px, 1.6vw, 24px);
      padding: 0.8vh 1vw;
      border-bottom: 1px solid #ddd;
    }

    .station-name {
      flex: 1;
      font-weight: bold;
    }

    .station-status {
      white-space: nowrap;
      margin-left: 1vw;
    }

    .station-section {
      margin-top: 1vh;
      border: 1px solid #ccc;
      background: #f9f9f9;
    }
  </style>
</head>

<body>
  <div id="board"></div>

  <script>
    const lineColors = {
      "Bakerloo": "#B36305",
      "Central": "#E32017",
      "Circle": "#FFD300",
      "District": "#00782A",
      "Hammersmith & City": "#F3A9BB",
      "Jubilee": "#A0A5A9",
      "Metropolitan": "#9B0056",
      "Northern": "#000000",
      "Piccadilly": "#003688",
      "Victoria": "#0098D4",
      "Waterloo & City": "#95CDBA"
    };

    const overgroundColors = {
      "Bakerloo": "#B36305",
      "East London": "#999999",
      "East Anglia": "#FF8200",
      "Great Western": "#1A1A1A",
      "Merseyrail": "#FF6600",
      "Southern": "#00AA44",
      "South Eastern": "#0078D4",
      "South Western": "#CC0000",
      "West Anglia": "#009999"
    };

    async function loadTubeStatus() {
      try {
        const res = await fetch('https://api.tfl.gov.uk/Line/Mode/tube/Status');
        const data = await res.json();

        const board = document.getElementById('board');
        
        // Add Tube section title
        const tubeTitle = document.createElement('div');
        tubeTitle.className = 'section-title';
        tubeTitle.textContent = 'London Underground';
        board.appendChild(tubeTitle);

        data.forEach(line => {
          const status = line.lineStatuses[0].statusSeverityDescription;
          const isGood = status === 'Good Service';

          const row = document.createElement('div');
          row.className = 'row';

          const name = document.createElement('div');
          name.className = 'line-name';
          name.textContent = line.name;
          name.style.background = lineColors[line.name] || '#000';

          const statusEl = document.createElement('div');
          statusEl.className = 'status ' + (isGood ? 'good' : 'bad');
          statusEl.textContent = status;

          row.appendChild(name);
          row.appendChild(statusEl);
          board.appendChild(row);
        });

      } catch (e) {
        console.error('Error loading tube data:', e);
      }
    }

    async function loadOvergroundStatus() {
      try {
        const res = await fetch('https://api.tfl.gov.uk/Line/Mode/overground/Status');
        const data = await res.json();

        const board = document.getElementById('board');
        
        // Add Overground section title
        const overgroundTitle = document.createElement('div');
        overgroundTitle.className = 'section-title';
        overgroundTitle.textContent = 'London Overground';
        board.appendChild(overgroundTitle);

        data.forEach(line => {
          const status = line.lineStatuses[0].statusSeverityDescription;
          const isGood = status === 'Good Service';

          const row = document.createElement('div');
          row.className = 'row';

          const name = document.createElement('div');
          name.className = 'line-name';
          name.textContent = line.name;
          name.style.background = overgroundColors[line.name] || '#666';

          const statusEl = document.createElement('div');
          statusEl.className = 'status ' + (isGood ? 'good' : 'bad');
          statusEl.textContent = status;

          row.appendChild(name);
          row.appendChild(statusEl);
          board.appendChild(row);
        });

      } catch (e) {
        console.error('Error loading overground data:', e);
      }
    }

async function getStopPoints(query) {
  const res = await fetch(`https://api.tfl.gov.uk/StopPoint/Search?query=${encodeURIComponent(query)}`);
  const data = await res.json();

  return data.matches || [];
}

function pickBestStopPoint(matches, mode) {
  return matches.find(m => m.modes?.includes(mode)) || null;
}


async function loadStationStatus() {
  const board = document.getElementById('board');

  const stationsTitle = document.createElement('div');
  stationsTitle.className = 'section-title';
  stationsTitle.textContent = 'Train Departures';
  board.appendChild(stationsTitle);

  const stations = [
    { name: "Paddington", query: "Paddington" },
    { name: "Marylebone", query: "Marylebone" }
  ];

  for (const station of stations) {
    const matches = await getStopPoints(station.query);

    // IMPORTANT: pick national rail, not tube
    const stop = pickBestStopPoint(matches, "national-rail");

    const section = document.createElement('div');
    section.className = 'station-section';

    const title = document.createElement('div');
    title.style.padding = '1vh 1vw';
    title.style.fontWeight = 'bold';
    title.textContent = station.name;

    section.appendChild(title);

    if (!stop) {
      const msg = document.createElement('div');
      msg.style.padding = '1vh 1vw';
      msg.textContent = 'No rail data found';
      section.appendChild(msg);
      board.appendChild(section);
      continue;
    }

    const res = await fetch(`https://api.tfl.gov.uk/StopPoint/${stop.id}/Arrivals`);
    let data = await res.json();

    data = data
      .filter(d => d.timeToStation != null)
      .sort((a, b) => a.timeToStation - b.timeToStation)
      .slice(0, 5);

    if (data.length === 0) {
      const msg = document.createElement('div');
      msg.style.padding = '1vh 1vw';
      msg.textContent = 'No live departures';
      section.appendChild(msg);
    } else {
      data.forEach(d => {
        const row = document.createElement('div');
        row.className = 'station-row';

        const dest = document.createElement('div');
        dest.className = 'station-name';
        dest.textContent = d.destinationName || 'Unknown';

        const mins = Math.round(d.timeToStation / 60);

        const time = document.createElement('div');
        time.className = 'station-status';
        time.textContent = mins <= 0 ? 'Due' : `${mins} min`;

        row.appendChild(dest);
        row.appendChild(time);
        section.appendChild(row);
      });
    }

    board.appendChild(section);
  }
}

    async function loadAllStatus() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      await loadTubeStatus();
      await loadOvergroundStatus();
      await loadStationStatus();
    }

    loadAllStatus();
    setInterval(loadAllStatus, 60000);
  </script>
</body>
</html>
