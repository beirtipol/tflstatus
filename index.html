<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TfL Sidebar</title>

  <style>
    body {
      margin: 0;
      background: white;
      font-family: Arial, sans-serif;
      color: black;
    }

    #board {
      width: 100%;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2vh 1.5vw;
      margin: 0.5vh 0.5vw;
      font-size: clamp(16px, 2.2vw, 36px); /* responsive but bounded */
      border-radius: 6px;
      box-sizing: border-box;
    }

    .line-name {
      font-weight: bold;
    }

    .status {
      padding: 0.3em 0.8em;
      border-radius: 4px;
      font-weight: bold;
      color: white;
      margin-left: 10px;
      white-space: nowrap;
      font-size: 0.9em;
    }

    .good {
      background: #008000;
    }

    .bad {
      background: #cc0000;
    }
  </style>
</head>

<body>
  <div id="board"></div>

  <script>
    const lineColors = {
      "Bakerloo": "#B36305",
      "Central": "#E32017",
      "Circle": "#FFD300",
      "District": "#00782A",
      "Hammersmith & City": "#F3A9BB",
      "Jubilee": "#A0A5A9",
      "Metropolitan": "#9B0056",
      "Northern": "#000000",
      "Piccadilly": "#003688",
      "Victoria": "#0098D4",
      "Waterloo & City": "#95CDBA"
    };

    async function loadStatus() {
      try {
        const res = await fetch('https://api.tfl.gov.uk/Line/Mode/tube/Status');
        const data = await res.json();

        const board = document.getElementById('board');
        board.innerHTML = '';

        data.forEach(line => {
          const status = line.lineStatuses[0].statusSeverityDescription;
          const isGood = status === 'Good Service';

          const row = document.createElement('div');
          row.className = 'row';

          const name = document.createElement('span');
          name.className = 'line-name';
          name.textContent = line.name;
          name.style.color = lineColors[line.name] || '#000';

          const statusEl = document.createElement('span');
          statusEl.className = 'status ' + (isGood ? 'good' : 'bad');
          statusEl.textContent = status;

          row.appendChild(name);
          row.appendChild(statusEl);
          board.appendChild(row);
        });

      } catch (e) {
        document.getElementById('board').innerHTML =
          '<div style="padding:16px;">Error loading data</div>';
      }
    }

    loadStatus();
    setInterval(loadStatus, 60000);
  </script>
</body>
</html>
